  </g>
  <text x="60" y="70" fill="#9CA6B0" font-size="15" letter-spacing="3">BLINK-TO-COMMAND CONTROL LOOP</text>
  <text x="60" y="96" fill="#5A646E" font-size="13">Embedded C · real-time control</text>

  <!-- main chain -->
  <g>
    <rect x="60" y="160" width="180" height="100" rx="10" fill="#0B0D10" stroke="#22272E" stroke-width="1.5"/>
    <text x="150" y="204" fill="#F8FAFB" font-size="16" text-anchor="middle">IR Blink</text>
    <text x="150" y="228" fill="#9CA6B0" font-size="13" text-anchor="middle">sensor</text>
  </g>
  <g>
