    <text x="810" y="204" fill="#F8FAFB" font-size="16" text-anchor="middle">L298N</text>
    <text x="810" y="228" fill="#9CA6B0" font-size="13" text-anchor="middle">motor control</text>
  </g>

  <!-- ultrasonic input -->
  <g>
    <rect x="390" y="330" width="180" height="90" rx="10" fill="#0B0D10" stroke="#22272E" stroke-width="1.5"/>
